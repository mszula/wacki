{{ define "head" }}
<meta name="robots" content="noindex, follow" />
{{ end }}

{{ define "main" }}
<section class="section" style="text-align: center; padding-block: 76px">
  <div class="wrap wrap--narrow">
    <p
      style="font-family: var(--font-display); font-size: clamp(4rem, 18vw, 9rem); line-height: 1; letter-spacing: 4px; color: #fff; -webkit-text-stroke: 2px var(--ink); text-shadow: 5px 5px 0 var(--ink); margin-bottom: 8px"
    >
      404
    </p>
    <h1 class="h2" style="justify-content: center">
      Kosmici zabrali tę stronę 👽
    </h1>
    <p class="lead-center">
      Strona, której szukasz, nie istnieje albo zmieniła adres. Wróć na stronę
      główną i graj dalej.
    </p>
    <p style="text-align: center; margin-top: 26px">
      <a class="btn btn--primary" href="{{ site.BaseURL }}">← Strona główna</a>
    </p>
  </div>
</section>
{{ end }}
